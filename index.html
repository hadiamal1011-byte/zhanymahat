<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Для моей любви ❤️</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div id="hearts"></div>

<!-- =================== -->
<!-- ЭКРАН 1 -->
<!-- =================== -->

<section id="screen1" class="screen active">

<div class="container">

<h1>

Ты готова,
<br>

моя любовь?🙂

</h1>

<button id="readyBtn" class="btn">

Готова

</button>

<p class="thanks">

Спасибо за всё ❤️

</p>

</div>

</section>

<!-- =================== -->
<!-- ЭКРАН 2 -->
<!-- =================== -->

<section id="screen2" class="screen">

<div class="container">

<h2>

Жонушка ❤️

</h2>

<div id="typing" class="typing"></div>

<button id="talkBtn" class="btn hidden">

Давай поговорим

</button>

</div>

</section>

<!-- =================== -->
<!-- ЭКРАН 3 -->
<!-- =================== -->

<section id="screen3" class="screen">

<div class="container">

<div class="envelope">

<div class="paper">

<div class="emoji">

💌

</div>

<h3>

Письмо

</h3>

<p>

Если хочешь поговорить, напиши. ❤️

<br><br>

До конца дня дай мне знать.

<br><br>

Если ты больше не хочешь продолжать наши отношения —

отпусти меня.

<br><br>

Какое бы решение ты ни приняла,

я приму его.

<br><br>

Береги себя. ❤️

</p>

</div>

</div>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
